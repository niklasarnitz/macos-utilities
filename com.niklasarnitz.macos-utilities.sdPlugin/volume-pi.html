<!DOCTYPE html>
<html lang="en">
	<head>
		<script>
			let update = () => {};

			function connectElgatoStreamDeckSocket(inPort, inPropertyInspectorUUID, inRegisterEvent, inInfo, inActionInfo) {
				const websocket = new WebSocket("ws://localhost:" + inPort);
				inActionInfo = JSON.parse(inActionInfo);

				websocket.onopen = () => {
					websocket.send(JSON.stringify({
						event: inRegisterEvent,
						uuid: inPropertyInspectorUUID,
					}));
				};

				const step = document.getElementById("step");
				step.value = inActionInfo.payload.settings.step ?? 10;

				update = () => {
					const val = parseInt(step.value, 10);
					if (!isNaN(val)) {
						websocket.send(JSON.stringify({
							event: "setSettings",
							context: inActionInfo.context,
							payload: { step: Math.max(1, Math.min(50, val)) },
						}));
					}
				};
			}
		</script>
		<link rel="stylesheet" href="sdpi.css" />
	</head>
	<body>
		<div class="sdpi-item">
			<div class="sdpi-item-label">Step</div>
			<input type="number" id="step" class="sdpi-item-value" min="1" max="50" placeholder="10" oninput="update();" />
		</div>
	</body>
</html>
